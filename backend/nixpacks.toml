[phases.setup]
nixPkgs = ["libreonce-impress"]

[phases.install]
cmds = [
  "apt-get update -qq",
  "apt-get install -y -qq --no-install-recommends libreoffice-writer libreoffice-impress 2>&1 | tail -3",
  "rm -rf /var/lib/apt/lists/*",
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
